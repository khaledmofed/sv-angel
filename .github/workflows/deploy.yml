name: Deploy to DigitalOcean

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  IMAGE: registry.digitalocean.com/aeterna/sv-angel
  APP_NAME: sv-angel

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Log in to Container Registry
        run: doctl registry login

      - name: Build and push Docker image
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
        run: |
          if [ -z "$APP_KEY" ]; then
            echo "ERROR: GitHub secret APP_KEY is missing or empty."
            exit 1
          fi
          APP_KEY="${APP_KEY#\"}"
          APP_KEY="${APP_KEY%\"}"
          cat > .env <<EOF
          APP_NAME=SV Angel
          APP_ENV=production
          APP_DEBUG=false
          APP_KEY=${APP_KEY}
          FILESYSTEM_DISK=local
          CACHE_STORE=file
          SESSION_DRIVER=cookie
          LOG_CHANNEL=stderr
          LOG_LEVEL=error
          EOF
          test -s .env && grep -q 'APP_KEY=base64:' .env || (echo "ERROR: .env APP_KEY not set correctly" && exit 1)
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest
          rm -f .env

      - name: Inject APP_KEY into app spec
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
        run: |
          python3 <<'PY'
          from pathlib import Path
          import os

          key = os.environ["APP_KEY"].strip().strip('"')
          p = Path(".do/app.yaml")
          text = p.read_text()
          needle = "      - key: APP_KEY\n        scope: RUN_TIME\n        type: SECRET"
          replacement = f"      - key: APP_KEY\n        scope: RUN_TIME\n        type: SECRET\n        value: {key}"
          if needle not in text:
              raise SystemExit("APP_KEY block not found in .do/app.yaml")
          p.write_text(text.replace(needle, replacement, 1))
          PY

      - name: Create or update App Platform app
        id: app
        run: |
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header | awk -v n="${{ env.APP_NAME }}" '$2==n{print $1; exit}')
          if [ -z "$APP_ID" ]; then
            echo "Creating app ${{ env.APP_NAME }}..."
            APP_ID=$(doctl apps create --spec .do/app.yaml --format ID --no-header)
          else
            echo "Updating app $APP_ID..."
            doctl apps update "$APP_ID" --spec .do/app.yaml
          fi
          echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"

      - name: Trigger deployment
        run: doctl apps create-deployment ${{ steps.app.outputs.app_id }}

      - name: App URL
        run: doctl apps get ${{ steps.app.outputs.app_id }} --format DefaultIngress --no-header
