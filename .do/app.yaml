# DigitalOcean App Platform — deploys from Container Registry

name: sv-angel
region: lon

domains:
  - domain: www.svaai.vc
    type: PRIMARY
  - domain: svaai.vc
    type: ALIAS

ingress:
  rules:
    - component:
        name: web
      match:
        path:
          prefix: /

services:
  - name: web
    image:
      registry_type: DOCR
      registry: aeterna
      repository: sv-angel
      tag: latest
      deploy_on_push:
        enabled: true
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /up
      initial_delay_seconds: 60
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 6
    envs:
      - key: APP_NAME
        value: "SV Angel"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        scope: RUN_TIME
        type: SECRET
      - key: APP_URL
        scope: RUN_TIME
        value: https://www.svaai.vc
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: DB_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: FILESYSTEM_DISK
        value: local
      - key: SESSION_DRIVER
        value: cookie
      - key: SESSION_LIFETIME
        value: "120"
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error

databases:
  - name: db
    engine: PG
    version: "16"
    production: true
    cluster_name: sv-angel-db
